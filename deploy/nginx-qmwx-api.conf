# ============================================================
# QM-WX API 反代片段 — 加到 /etc/nginx/conf.d/qm_web.conf 的 443 server block
# （在企业官网 server_name qingmulife.cn 块内，location / 之前）
#
# 作用：把 /health（精确）/api/ 反代到本地 qmwx-server 容器（127.0.0.1:3000）
# /uploads/ 由 nginx 直接 serve，省一次反代。
# 与企业官网（/）共存于同一域名 + SSL。
#
# 应用：把下面所有 location 块插入 443 server，nginx -t && systemctl reload nginx
#
# server 级别（443 顶部，server_name 后，location / 之前）建议加：
#     gzip on;
#     gzip_types application/json application/javascript text/css text/plain;
#     gzip_min_length 1024;
#     client_max_body_size 20m;   # 兜底防 413（API location 也会再覆盖一次）
# ============================================================

    # ----- 健康检查（精确匹配 = /health，绕过 /api/ 前缀）-----
    # docker compose 自愈也用此 endpoint（Dockerfile HEALTHCHECK）
    # access_log off：避免被监控/health 探测刷屏
    location = /health {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # ----- QM-WX 后端 API -----
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        client_max_body_size 20m;   # 上传图片保险（默认 1M 太严）
        # 微信支付回调需原始 body：app.ts 已用 parseAs:string 保留 rawBody，nginx 不改 body
    }

    # ----- 上传文件（nginx 直接 serve 静态，省一次 server 反代）-----
    # 前提：宿主机 /opt/qm-wx/uploads/ 目录与 docker compose 卷挂载点一致
    # docker-compose.prod.yml: ./uploads:/app/uploads
    location /uploads/ {
        alias /opt/qm-wx/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }