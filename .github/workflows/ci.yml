name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  TURBO_CACHE_DIR: .turbo

jobs:
  lint-typecheck-test:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: qmwx_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Generate Prisma client
        run: pnpm --filter @qm-wx/server prisma:generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/qmwx_test

      - name: Test
        run: pnpm --filter @qm-wx/server test:run
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/qmwx_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-32-chars-min-please
          WX_APPID: wx-test-appid
          WX_SECRET: wx-test-secret

  build-server:
    name: Build Server
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @qm-wx/shared build
      - run: pnpm --filter @qm-wx/server prisma:generate
      - run: pnpm --filter @qm-wx/server build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: server-build
          path: |
            apps/server/dist
            apps/server/prisma
          retention-days: 7
