/**
 * CI 工作流 — lint + typecheck + test（含 e2e）+ build
 *
 * 改动点（vs 旧版）：
 * 1. test:run → test（package.json 实际名）
 * 2. RUN_E2E=1 启用 e2e
 * 3. prisma migrate deploy 先于 generate（确保 schema 一致）
 * 4. shared build 先于 server typecheck（server tsconfig 用 reference）
 * 5. main 分支加 docker image build 验证
 */
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_call:    # 允许 deploy-staging.yml 复用
  workflow_dispatch: # 手动重跑

env:
  # 阿里云容器镜像服务（留空则只本地构建不推）
  ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}

jobs:
  lint-typecheck-test:
    name: Lint · Typecheck · Test (含 e2e)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: qmwx_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/qmwx_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-32-chars-min-please
      JWT_ACCESS_TTL: 2h
      WX_APPID: wx-test-appid
      WX_SECRET: wx-test-secret
      NODE_ENV: test
      RUN_E2E: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @qm-wx/shared build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Prisma migrate deploy
        run: pnpm --filter @qm-wx/server exec prisma migrate deploy

      - name: Prisma generate
        run: pnpm --filter @qm-wx/server prisma:generate

      - name: Test（含 e2e 真 DB）
        run: pnpm --filter @qm-wx/server test

  build-server:
    name: Build Server
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @qm-wx/shared build
      - run: pnpm --filter @qm-wx/server prisma:generate
      - run: pnpm --filter @qm-wx/server build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: server-build
          path: |
            apps/server/dist
            apps/server/prisma
          retention-days: 7

  docker-image:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: build-server
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Aliyun ACR
        if: env.ACR_REGISTRY != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.ACR_REGISTRY != '' && format('{0}/qm-wx/qm-wx-server', env.ACR_REGISTRY) || 'qm-wx-server' }}
          tags: |
            type=sha,prefix=ci-
            type=raw,value=staging,enable={{is_default_branch}}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/server
          push: ${{ env.ACR_REGISTRY != '' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

