/**
 * CI 工作流 — 4 job parallel：lint-typecheck → (unit-tests + e2e-tests) → build → docker
 *
 * 设计：
 * - lint-typecheck 最快（~2 min），最早反馈
 * - unit-tests 不需要 PG/Redis services（vi.mock 一切），跑得快
 * - e2e-tests 单独 job 带 PG/Redis services（启动慢），失败不阻塞 unit 反馈
 * - build-server 等两个 test 都通过
 * - docker-image 仅 main 分支 push 时
 */
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_call:    # 允许 deploy-staging.yml 复用
  workflow_dispatch: # 手动重跑

env:
  ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}

jobs:
  # ---- 1. Lint + Typecheck（无 services，最快反馈）----
  lint-typecheck:
    name: Lint · Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build shared
        run: pnpm --filter @qm-wx/shared build
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck

  # ---- 2a. Unit Tests（不需要 PG/Redis）----
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @qm-wx/shared build
      - run: pnpm --filter @qm-wx/server prisma:generate
      - name: Unit tests (exclude e2e)
        env:
          # 不设 RUN_E2E → e2e 文件内 it.skip
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-32-chars-min-please
          JWT_ACCESS_TTL: 2h
          WX_APPID: wx-test-appid
          WX_SECRET: wx-test-secret
          # 提供 stub URL（即使不连，env.ts Zod 校验需要）
          DATABASE_URL: postgresql://stub:stub@localhost:5432/stub
          REDIS_URL: redis://localhost:6379
        run: pnpm --filter @qm-wx/server exec vitest run --exclude 'tests/e2e/**'

  # ---- 2b. E2E Tests（需 PG + Redis services）----
  e2e-tests:
    name: E2E Tests (PG + Redis)
    runs-on: ubuntu-latest
    needs: lint-typecheck
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: qmwx_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/qmwx_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-32-chars-min-please
      JWT_ACCESS_TTL: 2h
      WX_APPID: wx-test-appid
      WX_SECRET: wx-test-secret
      NODE_ENV: test
      RUN_E2E: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @qm-wx/shared build
      - name: Prisma migrate deploy
        run: pnpm --filter @qm-wx/server exec prisma migrate deploy
      - name: Prisma generate
        run: pnpm --filter @qm-wx/server prisma:generate
      - name: E2E tests
        run: pnpm --filter @qm-wx/server exec vitest run tests/e2e

  # ---- 3. Build Server（等两个 test 都过）----
  build-server:
    name: Build Server
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @qm-wx/shared build
      - run: pnpm --filter @qm-wx/server prisma:generate
      - run: pnpm --filter @qm-wx/server build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: server-build
          path: |
            apps/server/dist
            apps/server/prisma
          retention-days: 7

  # ---- 4. Docker Image（仅 main push）----
  docker-image:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: build-server
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Aliyun ACR
        if: env.ACR_REGISTRY != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.ACR_REGISTRY != '' && format('{0}/qm-wx/qm-wx-server', env.ACR_REGISTRY) || 'qm-wx-server' }}
          tags: |
            type=sha,prefix=ci-
            type=raw,value=staging,enable={{is_default_branch}}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/server
          push: ${{ env.ACR_REGISTRY != '' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
