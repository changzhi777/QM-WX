/**
 * Staging 部署工作流
 *
 * 流程：
 * 1. 复用 ci.yml 的 build-server + docker-image（确保镜像已就位）
 * 2. SSH 到 staging ECS：
 *    - pull 新镜像
 *    - prisma migrate deploy
 *    - 重启 pm2 进程
 * 3. 跑健康检查
 * 4. 失败时回滚到上一个 tag
 *
 * 触发方式：
 * - workflow_dispatch（手动）— 默认 staging
 * - push to main + 含 [deploy-staging] 标记（自动）
 *
 * 必装 Secrets：
 * - STAGING_HOST       ECS 公网 IP / 域名
 * - STAGING_SSH_KEY    私钥（推荐 ed25519）
 * - STAGING_USER       SSH 用户（默认 deploy）
 * - STAGING_URL        部署后健康检查 URL（如 https://staging.example.com）
 */
name: Deploy Staging

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '镜像 tag（留空用 main latest）'
        required: false
        default: 'staging'
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'

jobs:
  build:
    uses: ./.github/workflows/ci.yml
    with: {}  # 复用全部默认

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    environment: staging
    steps:
      - name: Resolve image tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ] || [ "$TAG" = "staging" ]; then
            TAG="staging-${{ github.sha }}"
          fi
          echo "value=$TAG" >> $GITHUB_OUTPUT

      - name: Deploy to ECS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER || 'deploy' }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -euo pipefail
            TAG="${{ steps.tag.outputs.value }}"
            IMAGE="${{ env.ACR_REGISTRY }}/qm-wx/qm-wx-server:${TAG}"

            # 跑 staging 部署脚本（项目内 deploy/staging.sh）
            cd /opt/qm-wx
            git pull --ff-only 2>/dev/null || true
            IMAGE_TAG="$TAG" CONTAINER_IMAGE="$IMAGE" \
              bash deploy/staging.sh

      - name: Health check
        if: env.STAGING_URL != ''
        run: |
          sleep 15  # 等容器起来
          for i in {1..5}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              "${{ secrets.STAGING_URL }}/health" || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ health check OK (attempt $i)"
              exit 0
            fi
            echo "⏳ attempt $i: HTTP $HTTP_CODE, retry in 10s"
            sleep 10
          done
          echo "❌ health check failed"
          exit 1

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Staging deploy failed for ${{ steps.tag.outputs.value }}"
          echo "请检查："
          echo "  1. ECS SSH 是否可达（staging host: ${{ secrets.STAGING_HOST }}）"
          echo "  2. deploy/staging.sh 权限 + 内容"
          echo "  3. 日志：ssh deploy@${{ secrets.STAGING_HOST }} 'pm2 logs qm-wx-server --lines 100'"
